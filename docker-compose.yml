# Two build targets from ONE Dockerfile, selected by `platform`:
#
#   claude      (default)  -> linux/arm64 : builds natively on Apple Silicon
#                                            (fast). Your day-to-day decomp +
#                                            recreation + headless mGBA work.
#   claude-x86  (profile)  -> linux/amd64 : x86 compatibility build, runs under
#                                            emulation on the Mac. Opt-in via the
#                                            "x86" profile so a plain `up`/`--build`
#                                            never pays the slow emulated rebuild.
#
# Why two compose services instead of one buildx multi-platform image: buildx
# --platform builds BOTH arches every time (the amd64 half always emulated/slow)
# and a multi-platform result can't be `--load`ed into the local image store on
# a Mac. Separate services let you build/run each independently and cache each;
# the arm64 one stays fast, the amd64 one is built only when you ask for it:
#     docker compose --profile x86 up -d --build
#     docker compose --profile x86 exec claude-x86 bash
#
# Both images carry the same emulator + Go/Ebiten toolchain, so the 1:1
# verification workflow (headless mGBA reference vs. headless recreation render)
# works on either. The GUI (mgba-qt) forwards to XQuartz; see emu.sh.

# --- Shared service definition (everything common to both arches) ---
x-claude-common: &claude-common
  build:
    context: .
    dockerfile: Dockerfile
  stdin_open: true
  tty: true

  # PID 1 = tini (Docker's --init). Without it, the `sleep infinity`
  # entrypoint becomes a non-reaping PID 1, so every orphaned process
  # (notably Xvfb from killed xvfb-run capture loops) zombifies forever
  # and eventually exhausts the kernel task ceiling — fork() then fails
  # with EAGAIN and no builds/gates/agents can run. tini reaps orphans
  # so a long capture-heavy session can't re-poison the box.
  init: true

  # ---------------------------------------------------------------------------
  # RESOURCE HEADROOM (added 2026-07-01 after an OOM/fd/PID-exhaustion crash
  # session; rationale in pokemon-pinball-table/docs/DOCKER-CONTAINER-NEEDS.md).
  #
  # The verification workload bursts hard: 3-6 background Agent worktrees each
  # running `xvfb-run go run` (~200-400 MB peak), a foreground replay search,
  # a native mGBA subprocess (~150 MB) for the ROM half of every diff, and
  # Pillow compositing — 15-30 heavyweight procs at the peak. The crashes were
  # exit-137 (OOM-kill) plus fork() failures from hitting the PID/nproc/fd
  # ceilings. These give the box room to burst without dying.
  #
  # NOTE (Docker Desktop on macOS): mem_limit cannot exceed the memory assigned
  # to the Docker Desktop VM. If 12g isn't landing, raise Docker Desktop ->
  # Settings -> Resources -> Memory to >=14 GB first (see verify steps in the
  # DOCKER-CONTAINER-NEEDS.md doc). These keys are plain `docker compose up`
  # (non-swarm) settings, so they apply to both the arm64 and x86 services.

  # ---- Memory: was OOM-killing at concurrency peaks (exit 137) ----
  mem_limit: 12g          # up from Docker's default; ~20 heavyweight procs of headroom
  memswap_limit: 16g      # mem_limit + 4g swap, so bursts spill to swap instead of dying
  mem_swappiness: 60      # prefer swapping cold pages over an OOM-kill

  # ---- Process / fd ceilings: fork() was failing (EAGAIN) under fan-out ----
  pids_limit: 8192        # Go goroutine-threads + xvfb-run trees + mGBA workers add up fast
  ulimits:
    nofile:               # every Go proc opens many pipes/sockets; verify.sh opens dozens
      soft: 65536
      hard: 65536
    nproc:                # same pressure as pids_limit but caught earlier at the ulimit layer
      soft: 8192
      hard: 8192

  # ---- Shared memory: Xvfb framebuffers + Ebiten texture staging live here ----
  shm_size: 2gb           # Docker default is 64 MB; multiple Xvfb displays thrash it

  # ---- RAM-backed scratch (see DOCKER-CONTAINER-NEEDS.md) ----
  # verify.sh writes many ~1 MB .jsonl probe dumps to /tmp per run and `go run`
  # churns a build cache; under fan-out these were disk-I/O bound. RAM-backing
  # removes the bottleneck and self-clears on restart. mode=1777 (sticky,
  # world-writable) so the jeff user can write into these root-owned mounts.
  # NOTE: the spec said /root/.cache — written blind from inside the sandbox.
  # The container runs as jeff (HOME=/Users/jeff), so Go's cache is
  # /Users/jeff/.cache (go-build). Corrected here.
  # exec: Docker tmpfs mounts default to noexec, but `go run`/`go build` run
  # compiled binaries out of /tmp and the go-build cache — noexec makes them
  # fail with "permission denied". Override it back to executable.
  tmpfs:
    - /tmp:size=2g,mode=1777,exec
    - /Users/jeff/.cache:size=1g,mode=1777,exec

  # ---- Restart: keep the idle box up across daemon restarts / reboots ----
  restart: unless-stopped

  # ---- Environment: trim per-run footprint so concurrency fits the box ----
  environment:
    # Headless runs skip Ebiten's singleton audio context (leak in
    # cmd/replay/search.go) — one less failure mode per xvfb-run.
    PPRS_NO_AUDIO: "1"
    # Collect more aggressively under many concurrent Go procs: a little CPU
    # for a lower peak RSS, which is what actually OOM-killed us.
    GOGC: "50"
    # Cap each Go proc's compute parallelism so one search can't monopolise
    # every core while 5 siblings also want CPU. Tune to host_cores/concurrency.
    GOMAXPROCS: "4"

  # Runs as jeff (uid=501, gid=20) — matches host file ownership so the
  # bind-mounted working trees stay usable by host git. HOME is /Users/jeff,
  # paths mirror the host, so Claude keys project state at
  # ~/.claude/projects/<cwd-slug>/ identically to the host. Sessions
  # cross-compatible.

  # ESCAPE POSTURE: only the two submodule working trees, state/, and
  # claude-config/ are mounted below. The orchestration repo ROOT — its .git,
  # .gitmodules, Dockerfile, docker-compose.yml, start.sh, run.sh,
  # claude-config sources — is NEVER mounted, so the host-executed
  # sandbox-definition files are unreachable (and unwritable) from inside the
  # container. The submodules keep their .git in-tree (not absorbed to
  # .git/modules), so nothing under the orchestration .git is ever exposed.
  #
  # The emulator added NO new mounts: baserom.gba lives in the pokepinballrs
  # working tree (RW below) and the verification harness + its reference frames
  # live in pokemon-pinball-table/tools/gba (RW below). Escape surface unchanged.
  volumes:
    # --- pokemon-pinball-table submodule (PRIMARY working repo): RW ---
    # Your Go project (cwd below). Progress persists on the host.
    - ./pokemon-pinball-table:/Users/jeff/Documents/github/pokemonpinballrs-docker/pokemon-pinball-table

    # --- pokepinballrs submodule (secondary working repo): RW ---
    # The GBA decomp; added to the agent's workspace via run.sh --add-dir.
    - ./pokepinballrs:/Users/jeff/Documents/github/pokemonpinballrs-docker/pokepinballrs

    # --- Per-repo .git/hooks + .git/config : READ ONLY (host-RCE guard) ---
    # The single biggest escape vector: git hooks/config in a shared .git
    # are arbitrary code that runs ON THE HOST when you later run git in
    # that tree. A poisoned agent could drop a post-commit / pre-push hook
    # or a core.fsmonitor/sshCommand/alias and own the host. Commits don't
    # need to write hooks/ or config, so locking these ro on BOTH rw
    # working repos keeps the workflow intact AND makes the commit-msg /
    # pre-push trailer guards tamper-proof from inside the sandbox.
    - ./pokemon-pinball-table/.git/hooks:/Users/jeff/Documents/github/pokemonpinballrs-docker/pokemon-pinball-table/.git/hooks:ro
    - ./pokemon-pinball-table/.git/config:/Users/jeff/Documents/github/pokemonpinballrs-docker/pokemon-pinball-table/.git/config:ro
    - ./pokepinballrs/.git/hooks:/Users/jeff/Documents/github/pokemonpinballrs-docker/pokepinballrs/.git/hooks:ro
    - ./pokepinballrs/.git/config:/Users/jeff/Documents/github/pokemonpinballrs-docker/pokepinballrs/.git/config:ro

    # --- pokepinballrs .claude/ : READ ONLY (prompt-injection guard) ---
    # A prompt-injected agent cannot rewrite the project's own skills /
    # hooks / settings / CLAUDE.md to escalate on a later run.
    - ./pokepinballrs/.claude:/Users/jeff/Documents/github/pokemonpinballrs-docker/pokepinballrs/.claude:ro

    # --- Container-local ~/.claude ---
    # Auth tokens, caches, container-local history. NOT the host's.
    - ./state/claude-home:/Users/jeff/.claude

    # --- Host session punch-throughs (override claude-home per path) ---
    # Direct bind mounts to the host so `claude --resume` works from
    # either environment and progress is crash-proof. One slug per
    # working dir (Claude keys sessions by cwd); both kept so neither
    # repo's session history is lost.
    - ${HOME}/.claude/projects/-Users-jeff-Documents-github-pokemonpinballrs-docker-pokemon-pinball-table:/Users/jeff/.claude/projects/-Users-jeff-Documents-github-pokemonpinballrs-docker-pokemon-pinball-table
    - ${HOME}/.claude/projects/-Users-jeff-Documents-github-pokemonpinballrs-docker-pokepinballrs:/Users/jeff/.claude/projects/-Users-jeff-Documents-github-pokemonpinballrs-docker-pokepinballrs
    - ${HOME}/.claude/history.jsonl:/Users/jeff/.claude/history.jsonl
    - ${HOME}/.claude/tasks:/Users/jeff/.claude/tasks
    - ${HOME}/.claude/file-history:/Users/jeff/.claude/file-history

    # --- Trusted, version-controlled config: READ ONLY ---
    # Ships the quarantine subagent + sandbox policy. Tamper-proof from
    # inside the container (overrides the rw claude-home per path).
    - ./claude-config/agents:/Users/jeff/.claude/agents:ro
    - ./claude-config/hooks:/Users/jeff/.claude/hooks:ro
    - ./claude-config/settings.json:/Users/jeff/.claude/settings.json:ro
    - ./claude-config/CLAUDE.md:/Users/jeff/.claude/CLAUDE.md:ro

    # --- Discord export: READ ONLY ---
    # DCE writes here (see discord-export.sh). The agent can only read
    # it — a compromised agent cannot tamper with the captured evidence,
    # and there is no Discord write tool anywhere in its tool surface.
    - ./state/discord-export:/Users/jeff/discord-export:ro

  working_dir: /Users/jeff/Documents/github/pokemonpinballrs-docker/pokemon-pinball-table

  # Container idles; run.sh execs `claude` into it with a TTY.
  entrypoint: ["sleep", "infinity"]

services:
  # Native arm64 (primary). agbcc + the arm-none-eabi cross-compiler emit GBA
  # ARM code regardless of host arch, so building here has no correctness cost;
  # `make compare` against baserom.gba is the final proof (community-standard
  # for pret decomps on arm64).
  claude:
    <<: *claude-common
    platform: linux/arm64
    container_name: pokepin-claude

  # x86 compatibility build. Behind the "x86" profile so it is NOT built or
  # started by default — only with `docker compose --profile x86 ...`.
  claude-x86:
    <<: *claude-common
    platform: linux/amd64
    container_name: pokepin-claude-x86
    profiles: ["x86"]
